services:
  sportease-traefik:
    image: traefik:v2.11
    container_name: sportease-traefik
    command:
      # - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.local3300.address=:3300"
      - "--entrypoints.local3300.forwardedHeaders.insecure=false"
    ports:
      - "3300:3300"
      # - "8080:8080" # Traefik Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - spotease-public
    restart: unless-stopped

  sportease-db:
    image: mysql:8.0
    container_name: sportease-db
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./backapp/db/conf.d:/etc/mysql/conf.d
    networks:
      - spotease-internal
    restart: always
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:latest
    profiles:
      - migration
    volumes:
      - ./backapp/db/migrations:/migrations:ro
    depends_on:
      sportease-db:
        condition: service_healthy
    command:
      [
        "-path", "/migrations",
        "-database", "mysql://${DB_USER}:${DB_PASSWORD}@tcp(sportease-db:3306)/${DB_DATABASE}?multiStatements=true",
        "up"
      ]
    networks:
      - spotease-internal

  demo-schema:
    image: mysql:8.0
    profiles:
      - demo
    environment:
      MYSQL_PWD: ${DB_PASSWORD}
    volumes:
      - ./backapp/db/demo:/demo:ro
    depends_on:
      sportease-db:
        condition: service_healthy
    command:
      [
        "mysql",
        "--host=sportease-db",
        "--port=3306",
        "--user=${DB_USER}",
        "--default-character-set=utf8mb4",
        "${DB_DATABASE}",
        "--execute=source /demo/prepare-schema.sql"
      ]
    networks:
      - spotease-internal

  demo-migrate:
    image: migrate/migrate:latest
    profiles:
      - demo
    volumes:
      - ./backapp/db/migrations:/migrations:ro
    depends_on:
      demo-schema:
        condition: service_completed_successfully
    command:
      [
        "-path", "/migrations",
        "-database", "mysql://${DB_USER}:${DB_PASSWORD}@tcp(sportease-db:3306)/${DB_DATABASE}?multiStatements=true",
        "up"
      ]
    networks:
      - spotease-internal

  demo-data:
    image: mysql:8.0
    profiles:
      - demo
    environment:
      MYSQL_PWD: ${DB_PASSWORD}
    volumes:
      - ./backapp/db/demo:/demo:ro
    depends_on:
      sportease-db:
        condition: service_healthy
      demo-migrate:
        condition: service_completed_successfully
    command:
      [
        "mysql",
        "--host=sportease-db",
        "--port=3306",
        "--user=${DB_USER}",
        "--default-character-set=utf8mb4",
        "${DB_DATABASE}",
        "--execute=source /demo/demo.sql"
      ]
    networks:
      - spotease-internal

  sportease-redis:
    image: redis:7-alpine
    container_name: sportease-redis
    networks:
      - spotease-internal
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  sportease-backapp:
    build:
      context: ./backapp
      network: host
    container_name: sportease-backapp
    env_file:
      - .env
    environment:
      DB_HOST: sportease-db
      DB_PORT: "3306"
      REDIS_ADDR: sportease-redis:6379
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-172.16.0.0/12}
    volumes:
      - uploads-data:/app/uploads
      - ./latex/how-to-use:/app/uploads/demo:ro
    depends_on:
      sportease-db:
        condition: service_healthy
      sportease-redis:
        condition: service_healthy
    networks:
      - spotease-public
      - spotease-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/health | grep -q 'UP'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web_spotease-public"
      - "traefik.http.routers.uploads.rule=(Host(`localhost`) || Host(`127.0.0.1`)) && PathPrefix(`/uploads`)"
      - "traefik.http.routers.uploads.entrypoints=local3300"
      - "traefik.http.services.uploads.loadbalancer.server.port=8080"

  sportease-frontapp:
    build:
      context: ./frontapp
      network: host
    container_name: frontapp
    env_file:
      - ./frontapp/.env
    environment:
      - BACKEND_URL=http://sportease-backapp:8080
      - BODY_SIZE_LIMIT=10M
      - PROTOCOL_HEADER=x-forwarded-proto
      - HOST_HEADER=x-forwarded-host
      - ADDRESS_HEADER=x-forwarded-for
      - XFF_DEPTH=1
    depends_on:
      sportease-backapp:
        condition: service_healthy
    networks:
      - spotease-public
      - spotease-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web_spotease-public"

      # localhost開発環境用（HTTP/3300番のみ）
      - "traefik.http.routers.frontend-localhost.rule=Host(`localhost`) || Host(`127.0.0.1`)"
      - "traefik.http.routers.frontend-localhost.entrypoints=local3300"

      # サービス設定
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

networks:
  spotease-public:
    driver: bridge
  spotease-internal:
    driver: bridge

volumes:
  db-data:
  uploads-data:
