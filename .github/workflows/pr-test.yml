name: Frontend Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - ci/auto-test # For testing the workflow itself

permissions:
  contents: read

jobs:
  frontend-test:
    name: Frontend SvelteKit Tests
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-noble
      options: --ipc=host
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontapp/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontapp
        run: npm ci

      - name: Check Formatting & Lint
        working-directory: ./frontapp
        run: npm run lint
        continue-on-error: true

      - name: Run Vitest
        working-directory: ./frontapp
        run: npm run test
        env:
          CI: 'true'

      - name: Run Playwright E2E
        working-directory: ./frontapp
        run: npm run test:e2e
        env:
          CI: 'true'
