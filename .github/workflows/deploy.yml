name: Test and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-test:
    name: Backend Go Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true
          cache-dependency-path: 'backapp/go.sum'

      - name: Install dependencies
        working-directory: ./backapp
        run: go mod download

      - name: Run unit tests
        working-directory: ./backapp
        run: |
          go test -v ./tests/handler/... ./tests/repository/... ./internal/websocket/...

      - name: Run race detector
        working-directory: ./backapp
        run: |
          go test -race -v ./tests/handler/... ./tests/repository/... ./internal/websocket/...

      - name: Generate coverage report
        working-directory: ./backapp
        run: |
          go test -v -covermode=atomic -coverprofile=coverage.out \
            -coverpkg=backapp/internal/handler,backapp/internal/repository,backapp/internal/websocket \
            ./tests/handler/... ./tests/repository/... ./internal/websocket/...
          go tool cover -func=coverage.out | tee coverage.txt

      - name: Publish coverage summary
        working-directory: ./backapp
        run: |
          {
            echo "## Backend Coverage"
            echo
            echo '```text'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backapp/coverage.out
            backapp/coverage.txt

  frontend-test:
    name: Frontend SvelteKit Tests
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-noble
      options: --ipc=host
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontapp/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontapp
        run: npm ci

      - name: Check Formatting & Lint
        working-directory: ./frontapp
        run: npm run lint
        continue-on-error: true

      - name: Run Vitest
        working-directory: ./frontapp
        run: npm run test
        env:
          CI: 'true'

      - name: Run Playwright E2E
        working-directory: ./frontapp
        run: npm run test:e2e
        env:
          CI: 'true'

  deploy:
    name: Deploy to Server
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Deploy using SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 30m
          script: |
            set -e

            cd $HOME/SportEase

            git fetch origin
            git merge origin/main

            docker compose -f docker-compose.production.yml up -d sportease-db

            mkdir -p "$HOME/db-backups"
            docker compose -f docker-compose.production.yml exec -T sportease-db sh -c 'mysqldump -u root -p"$MYSQL_ROOT_PASSWORD" "$MYSQL_DATABASE"' \
              > "$HOME/db-backups/sportease_before_deploy_$(date +%Y%m%d_%H%M%S).sql"

            docker compose -f docker-compose.production.yml exec -T sportease-db sh -c 'mysql -u root -p"$MYSQL_ROOT_PASSWORD" "$MYSQL_DATABASE" -e "
              CREATE TABLE IF NOT EXISTS schema_migrations (version bigint not null primary key, dirty boolean not null);
              INSERT INTO schema_migrations (version, dirty)
              SELECT
                CASE
                  WHEN EXISTS (
                    SELECT 1
                    FROM information_schema.tables
                    WHERE table_schema = DATABASE()
                      AND table_name = '\''round_check_ins'\''
                  ) THEN 3
                  ELSE 2
                END,
                false
              WHERE NOT EXISTS (SELECT 1 FROM schema_migrations)
                AND EXISTS (
                  SELECT 1
                  FROM information_schema.tables
                  WHERE table_schema = DATABASE()
                    AND table_name = '\''guide_documents'\''
                );
            "'

            docker compose -f docker-compose.production.yml --profile migration run --rm migrate

            docker compose -f docker-compose.production.yml build --no-cache
            docker compose -f docker-compose.production.yml up -d --build

            sleep 10

            docker compose -f docker-compose.production.yml up -d --build
