services:
  sportease-traefik:
    image: traefik:v2.11
    container_name: sportease-traefik
    command:
      # - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=${LETSENCRYPT_EMAIL}" # IMPORTANT: Change this in .env file!
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      # - "8080:8080" # Traefik Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - "./letsencrypt:/letsencrypt"
    networks:
      - spotease-public
    restart: unless-stopped

  sportease-db:
    image: mysql:8.0
    container_name: sportease-db
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./backapp/db/migrations:/docker-entrypoint-initdb.d
      - ./backapp/db/conf.d:/etc/mysql/conf.d
    networks:
      - spotease-internal
    restart: always
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  sportease-redis:
    image: redis:7-alpine
    container_name: sportease-redis
    networks:
      - spotease-internal
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  sportease-backapp:
    build:
      context: ./backapp
    container_name: sportease-backapp
    env_file:
      - .env
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      sportease-db:
        condition: service_healthy
      sportease-redis:
        condition: service_healthy
    networks:
      - spotease-public
      - spotease-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/health | grep -q 'UP'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uploads-https.rule=Host(`nitsche-gyouji.com`) && PathPrefix(`/uploads`)"
      - "traefik.http.routers.uploads-https.entrypoints=websecure"
      - "traefik.http.routers.uploads-https.tls.certresolver=myresolver"
      - "traefik.http.services.uploads.loadbalancer.server.port=8080"

  sportease-frontapp:
    build:
      context: ./frontapp
    container_name: frontapp
    env_file:
      - ./frontapp/.env
    environment:
      - BACKEND_URL=http://sportease-backapp:8080
      - ORIGIN=https://nitsche-gyouji.com
      - PROTOCOL_HEADER=x-forwarded-proto
      - HOST_HEADER=x-forwarded-host
    depends_on:
      sportease-backapp:
        condition: service_healthy
    networks:
      - spotease-public
      - spotease-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - "traefik.enable=true"

      # nitsche-gyouji.com用（80/443）
      - "traefik.http.routers.frontend-http.rule=Host(`nitsche-gyouji.com`)"
      - "traefik.http.routers.frontend-http.entrypoints=web"

      # 3. 既存のHTTPS用ルーター（nitsche-gyouji.comのみ）
      - "traefik.http.routers.frontend-https.rule=Host(`nitsche-gyouji.com`)"
      - "traefik.http.routers.frontend-https.entrypoints=websecure"
      - "traefik.http.routers.frontend-https.tls.certresolver=myresolver"
      - "traefik.http.routers.frontend-https.middlewares=security-headers"

      # セキュリティヘッダーミドルウェア
      - "traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.security-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.security-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.security-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.security-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.security-headers.headers.customResponseHeaders.Content-Security-Policy=default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';"

      # サービス設定（変更なし）
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

networks:
  spotease-public:
    driver: bridge
  spotease-internal:
    driver: bridge

volumes:
  db-data:
  uploads-data:
